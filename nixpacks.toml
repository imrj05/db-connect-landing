# nixpacks.toml configuration for Next.js Standalone
# Optimized for Coolify/Nixpacks deployment

[phases.setup]
nixPkgs = ["nodejs", "npm"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
NODE_VERSION = "22"
PORT = "3000"
# This ensures Next.js knows it's in a container
HOSTNAME = "0.0.0.0"
